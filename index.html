<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F0F1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VocabBD">
<title>VocabBD Flashcards</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0F0F1A;--surface:#1A1A2E;--accent:#4F8EF7;--accent2:#E05C00;--text:#F0EEE8;--muted:#6B6B8A;--radius:18px;--card-r:22px}
html,body{height:100%;width:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);overflow:hidden}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;transition:opacity .25s ease,transform .25s ease}
.screen.hidden{opacity:0;pointer-events:none;transform:translateX(28px)}
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;opacity:.12;z-index:0}
.orb1{width:300px;height:300px;background:#4F8EF7;top:-80px;left:-80px}
.orb2{width:250px;height:250px;background:#E05C00;bottom:-60px;right:-60px}

/* GROUPS */
#groupsScreen{background:var(--bg);overflow:hidden}
.g-header{padding:52px 20px 10px;flex-shrink:0;z-index:2}
.g-header h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#fff;line-height:1.1}
.g-header p{font-size:13px;color:var(--muted);margin-top:4px}
.g-scroll{flex:1;overflow-y:auto;padding:14px 20px 32px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.g-scroll::-webkit-scrollbar{display:none}
.g-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g-card{background:var(--surface);border-radius:var(--radius);border:1px solid rgba(255,255,255,.07);padding:14px 10px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:background .15s,transform .12s;position:relative;overflow:hidden}
.g-card:active{background:#252540;transform:scale(.96)}
.g-card.done{border-color:rgba(79,142,247,.4)}
.g-card.done::after{content:'вЬУ';position:absolute;top:7px;right:9px;font-size:10px;color:var(--accent);font-weight:700}
.g-num{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff;line-height:1}
.g-sub{font-size:10px;color:var(--muted);letter-spacing:.5px}
.g-bar{width:100%;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.g-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s}

/* STUDY */
#studyScreen{background:var(--bg)}
.s-top{display:flex;align-items:center;justify-content:space-between;padding:48px 20px 10px;flex-shrink:0;z-index:2}
.s-left{display:flex;align-items:center;gap:10px}
.back-btn{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.back-btn:active{background:rgba(255,255,255,.14)}
.s-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.shuffle-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:var(--text);border-radius:50px;padding:7px 14px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer}
.shuffle-btn:active{background:rgba(255,255,255,.14)}

.dots{display:flex;gap:4px;z-index:2;flex-shrink:0;align-self:center;flex-wrap:wrap;justify-content:center;padding:4px 20px;max-width:100%}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .3s;flex-shrink:0}
.dot.done{background:rgba(79,142,247,.5)}
.dot.active{background:var(--accent);width:16px;border-radius:5px}

.scene{flex:1;width:100%;max-width:400px;align-self:center;display:flex;align-items:center;justify-content:center;z-index:2;perspective:1000px;padding:4px 20px}
.card-wrap{width:100%;height:100%;max-height:490px;position:relative;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.4,.2,.2,1);cursor:pointer;user-select:none;will-change:transform}
.card-wrap.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:var(--card-r);backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden}

/* FRONT */
.front{background:#16213E;border:1px solid rgba(79,142,247,.25);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:28px 20px}
.front-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:500}
.front-word{font-family:'Syne',sans-serif;font-weight:800;color:#fff;text-align:center;line-height:1;white-space:nowrap;width:100%;font-size:52px}
.front-pron{font-size:12px;color:var(--muted);font-style:italic;text-align:center}
.front-pos{font-size:11px;color:rgba(79,142,247,.8);letter-spacing:1px;text-align:center}
.tap-hint{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px;margin-top:4px}
.tap-icon{width:26px;height:26px;border-radius:50%;border:1px solid var(--muted);display:flex;align-items:center;justify-content:center;font-size:13px}
.card-num-badge{position:absolute;top:16px;right:18px;font-size:11px;color:var(--muted)}

/* BACK */
.back{background:#FAFAF8;display:flex;flex-direction:column;transform:rotateY(180deg)}
.back-img{width:100%;height:55%;object-fit:cover;flex-shrink:0;display:block}
.back-img-ph{width:100%;height:55%;background:linear-gradient(135deg,#dde3ee,#bcc8da);flex-shrink:0}
.back-content{flex:1;min-height:0;padding:8px 14px 8px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.back-content::-webkit-scrollbar{display:none}
.back-word{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#0F0F1A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.back-divider{height:2px;background:linear-gradient(90deg,#4F8EF7,transparent);border-radius:2px;flex-shrink:0}
.lbl{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#4F8EF7;flex-shrink:0;margin-top:3px}
.meaning-txt{font-size:11.5px;color:#2A2A3E;line-height:1.45}
.bn-txt{font-size:11px;color:#4A5568;line-height:1.35}
.example-txt{font-size:11px;color:#555;font-style:italic;line-height:1.45}
.syn-row{font-size:10px;color:#444;line-height:1.4}
.syn-row span{color:#2A7D4F;font-weight:600}
.ant-row{font-size:10px;color:#444;line-height:1.4}
.ant-row span{color:#C0390B;font-weight:600}
.word-hl{color:#C0390B;font-weight:700;font-style:normal}

/* NAV */
.bottom-nav{display:flex;align-items:center;justify-content:center;gap:20px;z-index:2;flex-shrink:0;padding:6px 20px 26px}
.nav-btn{width:50px;height:50px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.nav-btn:active{background:rgba(255,255,255,.14)}
.nav-btn:disabled{opacity:.2;pointer-events:none}
.counter{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--muted);min-width:54px;text-align:center}

.install-banner{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid rgba(255,255,255,.1);padding:14px 18px;display:flex;align-items:center;gap:10px;z-index:200;transform:translateY(100%);transition:transform .4s}
.install-banner.show{transform:translateY(0)}
.install-banner p{flex:1;font-size:13px;color:var(--text);line-height:1.4}
.install-banner p span{color:var(--accent)}
.ib-btn{background:var(--accent);color:#fff;border:none;border-radius:50px;padding:9px 18px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;white-space:nowrap}
.ib-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px;line-height:1}

@keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.scene.animate{animation:cardIn .32s ease both}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- GROUPS SCREEN -->
<div class="screen" id="groupsScreen">
  <div class="g-header">
    <h1>VocabBD<br>Flashcards</h1>
    <p id="g-subtitle">35 groups ¬Ј 30 words each</p>
  </div>
  <div class="g-scroll">
    <div class="g-grid" id="groupsGrid"></div>
  </div>
</div>

<!-- STUDY SCREEN -->
<div class="screen hidden" id="studyScreen">
  <div class="s-top">
    <div class="s-left">
      <button class="back-btn" onclick="goBack()">&#8592;</button>
      <div class="s-title" id="studyTitle">Group 1</div>
    </div>
    <button class="shuffle-btn" onclick="doShuffle()">вЗД Shuffle</button>
  </div>
  <div class="dots" id="dots"></div>
  <div class="scene" id="scene">
    <div class="card-wrap" id="cardWrap" onclick="doFlip()">
      <div class="face front">
        <div class="card-num-badge" id="cardNum"></div>
        <div class="front-label">vocabulary</div>
        <div class="front-word" id="frontWord"></div>
        <div class="front-pron" id="frontPron"></div>
        <div class="front-pos" id="frontPos"></div>
        <div class="tap-hint"><div class="tap-icon">вЖЇ</div> tap to flip</div>
      </div>
      <div class="face back">
        <div id="imgSlot"></div>
        <div class="back-content">
          <div class="back-word" id="backWord"></div>
          <div class="back-divider"></div>
          <div class="lbl">Meaning</div>
          <div class="meaning-txt" id="backMeaning"></div>
          <div class="bn-txt" id="backBn"></div>
          <div class="lbl">Example</div>
          <div class="example-txt" id="backExample"></div>
          <div class="syn-row" id="synRow"></div>
          <div class="ant-row" id="antRow"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="bottom-nav">
    <button class="nav-btn" id="prevBtn" onclick="go(-1)">&#8592;</button>
    <div class="counter" id="counter"></div>
    <button class="nav-btn" id="nextBtn" onclick="go(1)">&#8594;</button>
  </div>
</div>

<div class="install-banner" id="installBanner">
  <p>Add <span>VocabBD</span> to your home screen.</p>
  <button class="ib-btn" onclick="doInstall()">Install</button>
  <button class="ib-close" onclick="closeBanner()">√Ч</button>
</div>

let currentGroup=null, deck=[], cur=0, flipped=false;
let imgCache={}, progress={}, deferredPrompt=null;

function buildGroupsGrid() {
  const grid = document.getElementById('groupsGrid');
  grid.innerHTML = GROUPS.map((g,i) => {
    const seen = progress[i]||0;
    const pct = Math.round((seen/g.words.length)*100);
    const done = seen >= g.words.length;
    return `<div class="g-card${done?' done':''}" onclick="openGroup(${i})">
      <div class="g-num">${i+1}</div>
      <div class="g-sub">${g.words.length} words</div>
      <div class="g-bar"><div class="g-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function openGroup(idx) {
  currentGroup = idx;
  deck = [...GROUPS[idx].words];
  cur = 0;
  document.getElementById('studyTitle').textContent = GROUPS[idx].name;
  showScreen('studyScreen');
  loadCard(0, false);
}

function hl(text, word) {
  return text.replace(new RegExp(word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i'),
    m => `<span class="word-hl">${m}</span>`);
}

function fitText(el) {
  let size=52; el.style.fontSize=size+'px';
  const max=el.parentElement.clientWidth-40;
  while(el.scrollWidth>max && size>20){size-=2; el.style.fontSize=size+'px';}
}

function loadCard(idx, animate) {
  const w = deck[idx];
  const wrap = document.getElementById('cardWrap');
  wrap.style.transition='none';
  wrap.classList.remove('flipped');
  flipped=false;
  void wrap.offsetHeight;
  wrap.style.transition='';

  const fw = document.getElementById('frontWord');
  fw.textContent = w.word.toUpperCase();
  requestAnimationFrame(() => fitText(fw));

  document.getElementById('cardNum').textContent   = `${idx+1} / ${deck.length}`;
  document.getElementById('counter').textContent   = `${idx+1} / ${deck.length}`;
  document.getElementById('frontPron').textContent = w.pron ? `/${w.pron}/` : '';
  document.getElementById('frontPos').textContent  = w.pos || '';
  document.getElementById('backWord').textContent  = w.word;
  document.getElementById('backMeaning').textContent = w.meaning;
  document.getElementById('backBn').textContent    = w.bn || '';
  document.getElementById('backExample').innerHTML = `"${hl(w.example, w.word)}"`;
  document.getElementById('synRow').innerHTML = w.syn ? `Syn: <span>${w.syn}</span>` : '';
  document.getElementById('antRow').innerHTML = w.ant ? `Ant: <span>${w.ant}</span>` : '';
  document.querySelector('.back-content').scrollTop = 0;

  const imgUrl = IMG_POOL[currentGroup % IMG_POOL.length];
  const slot = document.getElementById('imgSlot');
  if (imgCache[imgUrl]) {
    slot.innerHTML = `<img class="back-img" src="${imgUrl}" alt="${w.word}">`;
  } else {
    slot.innerHTML = `<div class="back-img-ph"></div>`;
    const im = new Image(); im.crossOrigin='anonymous';
    im.onload = () => {
      imgCache[imgUrl]=true;
      if (currentGroup!==null && IMG_POOL[currentGroup%IMG_POOL.length]===imgUrl)
        slot.innerHTML=`<img class="back-img" src="${imgUrl}" alt="${w.word}">`;
    };
    im.src = imgUrl;
  }

  document.getElementById('prevBtn').disabled = idx===0;
  document.getElementById('nextBtn').disabled = idx===deck.length-1;
  updateDots();

  if (currentGroup!==null) {
    const seen=progress[currentGroup]||0;
    if (idx+1>seen){progress[currentGroup]=idx+1; saveProgress();}
  }

  if (animate) {
    const scene=document.getElementById('scene');
    scene.classList.remove('animate'); void scene.offsetHeight;
    scene.classList.add('animate');
    scene.addEventListener('animationend',()=>scene.classList.remove('animate'),{once:true});
  }
}

function doFlip(){
  flipped=!flipped;
  document.getElementById('cardWrap').classList.toggle('flipped',flipped);
}
function go(dir){
  const n=cur+dir;
  if(n<0||n>=deck.length)return;
  cur=n; loadCard(cur,true);
}
function doShuffle(){
  const wrap=document.getElementById('cardWrap');
  wrap.style.transition='none'; wrap.classList.remove('flipped'); flipped=false;
  void wrap.offsetHeight; wrap.style.transition='';
  for(let i=deck.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];
  }
  cur=0; loadCard(cur,true);
}
function updateDots(){
  document.getElementById('dots').innerHTML=deck.map((_,i)=>
    `<div class="dot ${i===cur?'active':i<cur?'done':''}"></div>`).join('');
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('hidden',s.id!==id));
}
function goBack(){buildGroupsGrid();showScreen('groupsScreen');}

function saveProgress(){try{localStorage.setItem('vocabbd_prog',JSON.stringify(progress));}catch(e){}}
function loadProgress(){try{const p=localStorage.getItem('vocabbd_prog');if(p)progress=JSON.parse(p);}catch(e){}}

let tx=0;
document.getElementById('scene').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
document.getElementById('scene').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>55)go(dx<0?1:-1);
},{passive:true});

window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  setTimeout(()=>document.getElementById('installBanner').classList.add('show'),3000);
});
function doInstall(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{deferredPrompt=null;closeBanner();});
}
function closeBanner(){document.getElementById('installBanner').classList.remove('show');}
window.addEventListener('appinstalled',closeBanner);
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});

loadProgress();
buildGroupsGrid();
</script>
